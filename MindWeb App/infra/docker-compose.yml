version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindweb
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mindweb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindweb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mindweb:password@postgres:5432/mindweb
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://mindweb:password@postgres:5432/mindweb
      NEO4J_URI: bolt://neo4j:7687
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - api
    command: celery -A celery_worker.celery_app worker --loglevel=info --concurrency=4

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
  neo4j_data:
